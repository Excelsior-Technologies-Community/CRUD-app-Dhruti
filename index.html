<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    keyframes: {
                        fadeIn: {
                            'from': { opacity: '0', transform: 'translateY(20px)' },
                            'to': { opacity: '1', transform: 'translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="min-h-screen flex justify-center items-start pt-[60px] bg-[#18181B] font-sans text-[#FAFAFA]">

    <div class="w-full max-w-[900px]">

        <!-- PRODUCT TABLE -->

        <!-- Custom Notification Banner -->
        <div id="notification"
            class="hidden flex justify-between items-center p-4 mb-4 text-sm rounded-xl border border-[#E9D5FF] bg-[#F8F5FF] text-[#2D1B3D] shadow-md transition-all duration-300 transform translate-y-[-10px] opacity-0"
            role="alert">

            <!-- Left Side -->
            <div class="flex items-center">
                <i id="notificationIcon" class="fa-solid fa-circle-check mr-2 text-lg text-[#C084FC]"></i>

                <div id="notificationMessage" class="font-medium">
                    Product added successfully
                </div>
            </div>

            <!-- Close Button -->
            <button onclick="closeNotification()"
                class="ml-4 text-[#7C6F8A] hover:text-[#A855F7] transition-all duration-300 cursor-pointer">

                <i class="fa-solid fa-xmark text-[18px]"></i>

            </button>

        </div>

        <div
            class="w-full mt-[30px] mb-[50px] bg-[#27272A] border border-[#3F3F46] p-[25px] rounded-[10px] shadow-2xl animate-[fadeIn_0.5s_ease]">

            <!-- HEADER -->
            <div
                class="w-full flex flex-col md:flex-row md:justify-between md:items-center gap-[15px] mb-[25px] border-b border-[#3F3F46] pb-[18px]">

                <div class="flex items-center gap-[12px]">
                    <h2 class="text-3xl font-bold text-[#FAFAFA] tracking-wide">
                        Products
                    </h2>

                    <span id="productCount"
                        class="text-xs font-semibold bg-[#FED7AA] text-[#18181B] py-[5px] px-[10px] rounded-full shadow-md">
                        0 items
                    </span>
                </div>

                <div class="flex flex-col sm:flex-row sm:items-center gap-[12px] w-full md:w-auto">

                    <!-- Category Filter Dropdown -->
                    <div class="relative w-full sm:w-[220px]">

                        <i
                            class="fa-solid fa-filter absolute left-[12px] top-[50%] translate-y-[-50%] text-[#FDBA74] text-[14px]"></i>

                        <select id="categoryFilter" onchange="handleCategoryFilterChange(this.value)"
                            class="w-full pl-[35px] pr-[35px] py-[11px] bg-[#3F3F46] border border-[#52525B] rounded-[10px] text-[14px] text-[#FAFAFA] outline-none cursor-pointer transition-all duration-300 appearance-none hover:border-[#FDBA74] focus:border-[#FDBA74] focus:shadow-[0_0_12px_rgba(251,146,60,0.3)]">

                            <option value="all">All Categories</option>

                        </select>

                        <i
                            class="fa-solid fa-chevron-down absolute right-[12px] top-[50%] translate-y-[-50%] text-[#A1A1AA] text-[12px] pointer-events-none"></i>
                    </div>

                    <!-- Add New Product Button -->
                    <button
                        onclick="openAddModal()"
                        class="w-full sm:w-auto py-[11px] px-[18px] flex justify-center items-center gap-[8px] bg-[#FB923C] text-white text-[14px] font-semibold border-none rounded-[10px] cursor-pointer transition-all duration-300 hover:bg-[#F97316] hover:-translate-y-[2px] hover:shadow-lg">

                        <i class="fa-solid fa-plus"></i>
                        Add New Product

                    </button>

                </div>

            </div>

            <!-- TABLE -->
            <table class="w-full border-collapse mt-[15px] overflow-hidden rounded-[12px]">

                <thead>

                    <tr>

                        <th class="bg-[#3F3F46] text-[#FAFAFA] p-[14px] text-left font-semibold">#</th>

                        <th class="bg-[#3F3F46] text-[#FAFAFA] p-[14px] text-left font-semibold">Name</th>

                        <th class="bg-[#3F3F46] text-[#FAFAFA] p-[14px] text-left font-semibold">Price</th>

                        <th class="bg-[#3F3F46] text-[#FAFAFA] p-[14px] text-left font-semibold">Category</th>

                        <th class="bg-[#3F3F46] text-[#FAFAFA] p-[14px] text-left font-semibold">Actions</th>

                    </tr>

                </thead>

                <tbody id="productTableBody"
                    class="[&>tr]:border-b [&>tr]:border-[#3F3F46] [&>tr:hover]:bg-[#323238] [&>tr]:transition-all [&>tr]:duration-300">

                </tbody>

            </table>

        </div>
    </div>

    <!-- ADD PRODUCT MODAL -->

    <div id="addModal"
        class="hidden fixed z-[1000] left-0 top-0 w-full h-full bg-[rgba(0,0,0,0.7)] backdrop-blur-sm justify-center items-center">

        <div
            class="bg-[#27272A] border border-[#3F3F46] p-[30px] w-[360px] rounded-[20px] relative shadow-2xl animate-[fadeIn_0.3s_ease]">

            <span
                class="absolute right-[15px] top-[10px] text-[26px] cursor-pointer text-[#FB923C] hover:text-[#F97316] transition-all duration-300"
                onclick="closeAddModal()">
                &times;
            </span>

            <h2 class="text-2xl font-bold text-center mb-[24px] text-[#FAFAFA]">
                Add Product
            </h2>

            <form id="productForm">

                <div class="mb-[15px]">

                    <input type="text" id="name" placeholder="Product Name"
                        class="w-full p-[12px] bg-[#18181B] border border-[#3F3F46] rounded-[10px] outline-none transition-all duration-300 text-[15px] text-[#FAFAFA] placeholder:text-[#A1A1AA] focus:border-[#FDBA74] focus:shadow-[0_0_10px_rgba(251,146,60,0.3)]"
                        required>

                </div>

                <div class="mb-[15px]">

                    <input type="text" id="price" placeholder="Price"
                        class="w-full p-[12px] bg-[#18181B] border border-[#3F3F46] rounded-[10px] outline-none transition-all duration-300 text-[15px] text-[#FAFAFA] placeholder:text-[#A1A1AA] focus:border-[#FDBA74] focus:shadow-[0_0_10px_rgba(251,146,60,0.3)]"
                        required>

                </div>

                <div class="mb-[18px]">

                    <select id="category"
                        class="w-full p-[12px] bg-[#18181B] border border-[#3F3F46] rounded-[10px] outline-none transition-all duration-300 text-[15px] text-[#FAFAFA] focus:border-[#FDBA74] focus:shadow-[0_0_10px_rgba(251,146,60,0.3)]"
                        required>

                        <option value="">Select Category</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Fashion">Fashion</option>
                        <option value="Books">Books</option>
                        <option value="Food">Food</option>
                        <option value="Sports">Sports</option>

                    </select>

                </div>

                <button type="submit"
                    class="w-full p-[12px] border-none rounded-[10px] bg-[#FB923C] text-white text-[16px] font-semibold cursor-pointer transition-all duration-300 hover:bg-[#F97316] hover:-translate-y-[2px] hover:shadow-lg">

                    Add Product

                </button>

            </form>

        </div>

    </div>

    <!-- EDIT MODAL -->

    <div id="editModal"
        class="hidden fixed z-[1000] left-0 top-0 w-full h-full bg-[rgba(0,0,0,0.7)] backdrop-blur-sm justify-center items-center">

        <div
            class="bg-[#27272A] border border-[#3F3F46] p-[30px] w-[360px] rounded-[20px] relative shadow-2xl animate-[fadeIn_0.3s_ease]">

            <span
                class="absolute right-[15px] top-[10px] text-[26px] cursor-pointer text-[#FB923C] hover:text-[#F97316] transition-all duration-300"
                onclick="closeModal()">
                &times;
            </span>

            <h2 class="text-2xl font-bold text-center mb-[24px] text-[#FAFAFA]">
                Edit Product
            </h2>

            <form id="editForm">

                <input type="hidden" id="editId">

                <div class="mb-[15px]">

                    <input type="text" id="editName" placeholder="Product Name"
                        class="w-full p-[12px] bg-[#18181B] border border-[#3F3F46] rounded-[10px] outline-none transition-all duration-300 text-[15px] text-[#FAFAFA] placeholder:text-[#A1A1AA] focus:border-[#FDBA74] focus:shadow-[0_0_10px_rgba(251,146,60,0.3)]"
                        required>

                </div>

                <div class="mb-[15px]">

                    <input type="text" id="editPrice" placeholder="Price"
                        class="w-full p-[12px] bg-[#18181B] border border-[#3F3F46] rounded-[10px] outline-none transition-all duration-300 text-[15px] text-[#FAFAFA] placeholder:text-[#A1A1AA] focus:border-[#FDBA74] focus:shadow-[0_0_10px_rgba(251,146,60,0.3)]"
                        required>

                </div>

                <div class="mb-[18px]">

                    <select id="editCategory"
                        class="w-full p-[12px] bg-[#18181B] border border-[#3F3F46] rounded-[10px] outline-none transition-all duration-300 text-[15px] text-[#FAFAFA] focus:border-[#FDBA74] focus:shadow-[0_0_10px_rgba(251,146,60,0.3)]"
                        required>

                        <option value="">Select Category</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Fashion">Fashion</option>
                        <option value="Books">Books</option>
                        <option value="Food">Food</option>
                        <option value="Sports">Sports</option>

                    </select>

                </div>

                <button type="submit"
                    class="w-full p-[12px] border-none rounded-[10px] bg-[#FB923C] text-white text-[16px] font-semibold cursor-pointer transition-all duration-300 hover:bg-[#F97316] hover:-translate-y-[2px] hover:shadow-lg">

                    Update Product

                </button>

            </form>

        </div>

    </div>

    <!-- DELETE MODAL -->

    <div id="deleteModal"
        class="hidden fixed z-[1000] left-0 top-0 w-full h-full bg-[rgba(0,0,0,0.7)] backdrop-blur-sm justify-center items-center transition-all duration-300 opacity-0">

        <div
            class="bg-[#27272A] border border-[#3F3F46] p-[30px] w-[380px] rounded-[20px] relative shadow-2xl transform scale-95 opacity-0 transition-all duration-300 flex flex-col items-center text-center">

            <div class="w-[65px] h-[65px] bg-[#FED7AA] rounded-full flex items-center justify-center mb-4">

                <i class="fa-solid fa-triangle-exclamation text-[#EA580C] text-2xl"></i>

            </div>

            <h3 class="text-xl font-bold text-[#FAFAFA] mb-2">
                Delete Product
            </h3>

            <p class="text-[#A1A1AA] text-[15px] mb-6">
                Are you sure you want to delete this product?
            </p>

            <div class="flex gap-[12px] w-full">

                <button onclick="closeDeleteModal()"
                    class="flex-1 py-[12px] border border-[#52525B] rounded-[10px] text-[#FAFAFA] bg-[#18181B] font-semibold text-[15px] hover:bg-[#27272A] transition-colors cursor-pointer">

                    Cancel

                </button>

                <button id="confirmDeleteBtn" onclick="executeDelete()"
                    class="flex-1 py-[12px] rounded-[10px] text-white bg-[#EA580C] font-semibold text-[15px] hover:bg-[#DC2626] transition-colors shadow-lg cursor-pointer">

                    Delete

                </button>

            </div>

        </div>

    </div>

    <script>
        const form = document.getElementById("productForm");
        let allProducts = [];
        let filteredProducts = [];
        let selectedCategory = "all";
        let productIdToDelete = null;

        // HTML escaping utility to prevent script injection and layout breakage
        function escapeHTML(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Custom Notification Banner utility
        function showNotification(message, type = "success") {
            const notif = document.getElementById("notification");
            const notifMsg = document.getElementById("notificationMessage");
            const notifIcon = document.getElementById("notificationIcon");

            notifMsg.textContent = message;

            // Clear previous style classes
            notif.classList.remove(
                "bg-emerald-50", "text-emerald-800", "border-emerald-200",
                "bg-rose-50", "text-rose-800", "border-rose-200"
            );
            notifIcon.classList.remove("fa-circle-check", "text-emerald-600", "fa-circle-xmark", "text-rose-600");

            if (type === "success") {
                notif.classList.add("bg-emerald-50", "text-emerald-800", "border-emerald-200");
                notifIcon.classList.add("fa-circle-check", "text-emerald-600");
            } else {
                notif.classList.add("bg-rose-50", "text-rose-800", "border-rose-200");
                notifIcon.classList.add("fa-circle-xmark", "text-rose-600");
            }

            notif.classList.remove("hidden");
            // Force reflow
            void notif.offsetWidth;
            notif.classList.remove("opacity-0", "translate-y-[-10px]");
            notif.classList.add("opacity-100", "translate-y-0");

            if (window.notifTimeout) {
                clearTimeout(window.notifTimeout);
            }
            window.notifTimeout = setTimeout(() => {
                notif.classList.remove("opacity-100", "translate-y-0");
                notif.classList.add("opacity-0", "translate-y-[-10px]");

                setTimeout(() => {
                    notif.classList.add("hidden");
                }, 300);
            }, 3500);
        }

        // Toggling functions for addModal
        function openAddModal() {
            const addModal = document.getElementById("addModal");
            addModal.classList.remove("hidden");
            addModal.classList.add("flex");
        }

        function closeAddModal() {
            const addModal = document.getElementById("addModal");
            addModal.classList.add("hidden");
            addModal.classList.remove("flex");
        }

        // Toggling functions for editModal
        function openEditModal(index) {
            const product = allProducts[index];
            if (!product) return;

            document.getElementById("editId").value = product._id;
            document.getElementById("editName").value = product.name;
            document.getElementById("editPrice").value = product.price;
            document.getElementById("editCategory").value = product.category;

            const editModal = document.getElementById("editModal");
            editModal.classList.remove("hidden");
            editModal.classList.add("flex");
        }

        function closeModal() {
            const editModal = document.getElementById("editModal");
            editModal.classList.add("hidden");
            editModal.classList.remove("flex");
        }

        // Toggling functions for deleteModal
        function openDeleteModal(id) {
            productIdToDelete = id;
            const modal = document.getElementById("deleteModal");
            const modalContent = modal.querySelector("div");

            modal.classList.remove("hidden");
            modal.classList.add("flex");
            // Force reflow
            void modal.offsetWidth;
            modal.classList.remove("opacity-0");
            modal.classList.add("opacity-100");

            modalContent.classList.remove("scale-95", "opacity-0");
            modalContent.classList.add("scale-100", "opacity-100");
        }

        function closeDeleteModal() {
            const modal = document.getElementById("deleteModal");
            const modalContent = modal.querySelector("div");

            modal.classList.remove("opacity-100");
            modal.classList.add("opacity-0");

            modalContent.classList.remove("scale-100", "opacity-100");
            modalContent.classList.add("scale-95", "opacity-0");

            setTimeout(() => {
                modal.classList.add("hidden");
                modal.classList.remove("flex");
                productIdToDelete = null;
            }, 300);
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const productData = {
                name: document.getElementById("name").value,
                price: document.getElementById("price").value,
                category: document.getElementById("category").value,
            };

            try {
                const response = await fetch("http://localhost:5000/api/products", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify(productData),
                });

                const data = await response.json();
                console.log(data);

                // REFRESH TABLE
                fetchProducts();

                // RESET FORM
                form.reset();

                // CLOSE MODAL
                closeAddModal();

                // SUCCESS MESSAGE
                showNotification("Product added successfully");

            } catch (error) {
                console.error(error);
                showNotification("Something went wrong", "error");
            }
        });

        // FETCH PRODUCTS
        async function fetchProducts() {
            try {
                const response = await fetch("http://localhost:5000/api/products");
                allProducts = await response.json();

                // Dynamically update the category filter options based on all products
                updateCategoryFilterDropdown();

                // Render the table based on active filter state
                renderTable();

            } catch (error) {
                console.error("Error fetching products:", error);
                const tableBody = document.getElementById("productTableBody");
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="5" class="p-[12px] text-center text-red-500 font-semibold">
                            Failed to load products. Make sure the server is running.
                        </td>
                    </tr>
                `;
            }
        }

        // DYNAMIC CATEGORY FILTER POPULATION
        function updateCategoryFilterDropdown() {
            const dropdown = document.getElementById("categoryFilter");
            if (!dropdown) return;

            const categories = new Set();
            if (Array.isArray(allProducts)) {
                allProducts.forEach(product => {
                    if (product.category) {
                        categories.add(product.category.trim());
                    }
                });
            }

            // Build dynamic options sorted alphabetically
            let optionsHTML = `<option value="all">All Categories</option>`;
            Array.from(categories).sort().forEach(category => {
                const isSelected = category === selectedCategory ? "selected" : "";
                optionsHTML += `<option value="${escapeHTML(category)}" ${isSelected}>${escapeHTML(category)}</option>`;
            });

            dropdown.innerHTML = optionsHTML;

            // Reset filter state to "all" if previously selected category no longer exists
            if (selectedCategory !== "all" && !categories.has(selectedCategory)) {
                selectedCategory = "all";
                dropdown.value = "all";
            }
        }

        // RENDER FILTERED PRODUCTS TABLE
        function renderTable() {
            const tableBody = document.getElementById("productTableBody");
            const productCount = document.getElementById("productCount");
            if (!tableBody) return;

            tableBody.innerHTML = "";

            // Filter products based on state
            if (selectedCategory === "all") {
                filteredProducts = allProducts;
            } else {
                filteredProducts = allProducts.filter(
                    product => product.category && product.category.trim() === selectedCategory
                );
            }

            // Update item count badge
            const totalCount = Array.isArray(allProducts) ? allProducts.length : 0;
            const filteredCount = Array.isArray(filteredProducts) ? filteredProducts.length : 0;

            if (selectedCategory === "all") {
                productCount.textContent = `${totalCount} items`;
            } else {
                productCount.textContent = `${filteredCount} of ${totalCount} items`;
            }

            if (!Array.isArray(filteredProducts) || filteredProducts.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="5" class="p-[12px] text-center text-gray-500 font-medium">
                            No products found matching this category.
                        </td>
                    </tr>
                `;
                return;
            }

            filteredProducts.forEach((product, index) => {
                // Find correct overall index in allProducts for Edit Modal mapping
                const overallIndex = allProducts.findIndex(p => p._id === product._id);

                tableBody.innerHTML += `
                    <tr>
                        <td class="p-[12px] border-b border-b-[#ddd]">${index + 1}</td>
                        <td class="p-[12px] border-b border-b-[#ddd]">${escapeHTML(product.name)}</td>
                        <td class="p-[12px] border-b border-b-[#ddd]">₹${escapeHTML(product.price)}</td>
                        <td class="p-[12px] border-b border-b-[#ddd]">${escapeHTML(product.category)}</td>
                        <td class="p-[12px] border-b border-b-[#ddd]">
                            <div class="flex gap-[8px]">
                                <button 
                                    class="w-[33px] h-[33px] border-none rounded-[8px] text-white cursor-pointer flex justify-center items-center text-[13px] transition-all duration-300 bg-[orange] hover:bg-[#5a67d8] hover:-translate-y-[2px]"
                                    title="Edit Product"
                                    onclick="openEditModal(${overallIndex})"
                                >
                                    <i class="fa-solid fa-pen"></i>
                                </button>
                                <button 
                                    class="w-[33px] h-[33px] border-none rounded-[8px] text-white cursor-pointer flex justify-center items-center text-[13px] transition-all duration-300 bg-[crimson] hover:bg-[#5a67d8] hover:-translate-y-[2px]"
                                    title="Delete Product"
                                    onclick="openDeleteModal('${product._id}')"
                                >
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        // CATEGORY FILTER ONCHANGE HANDLER
        function handleCategoryFilterChange(value) {
            selectedCategory = value;
            renderTable();
        }

        // DELETE PRODUCT (API Triggered by Confirmation Modal)
        async function executeDelete() {
            if (!productIdToDelete) return;

            try {
                const response = await fetch(`http://localhost:5000/api/products/${productIdToDelete}`, {
                    method: "DELETE",
                });

                if (response.ok) {
                    closeDeleteModal();
                    fetchProducts();
                    showNotification("Product deleted successfully");
                } else {
                    showNotification("Failed to delete product", "error");
                }
            } catch (error) {
                console.error("Error deleting product:", error);
                showNotification("Failed to delete product", "error");
            }
        }

        // CALL PRODUCTS
        fetchProducts();

        // UPDATE PRODUCT
        const editForm = document.getElementById("editForm");

        editForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const id = document.getElementById("editId").value;
            const updatedProduct = {
                name: document.getElementById("editName").value,
                price: document.getElementById("editPrice").value,
                category: document.getElementById("editCategory").value,
            };

            try {
                const response = await fetch(`http://localhost:5000/api/products/${id}`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify(updatedProduct),
                });

                const data = await response.json();
                console.log(data);

                showNotification("Product updated successfully");
                closeModal();
                fetchProducts();

            } catch (error) {
                console.error(error);
                showNotification("Update Failed", "error");
            }
        });

        // Close modal when clicking outside content area
        window.onclick = function (e) {
            const addModal = document.getElementById("addModal");
            const editModal = document.getElementById("editModal");
            const deleteModal = document.getElementById("deleteModal");

            if (e.target === addModal) {
                closeAddModal();
            }
            if (e.target === editModal) {
                closeModal();
            }
            if (e.target === deleteModal) {
                closeDeleteModal();
            }
        };

    </script>

</body>

</html>
